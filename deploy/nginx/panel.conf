# nginx location blocks for the open-lzt panel. Sourced by deploy/setup_tls.sh, which substitutes
# ${PANEL_ROOT}, ${FLOW_PORT} and ${EVENTUS_PORT} — it is not a standalone site file.
#
# The ordering matters: nginx picks the longest matching prefix, so /api/ and /eventus/ win over /
# regardless of the order they appear in here.

# The panel's SSE stream. Split out from /api/ for one reason: proxy_buffering.
#
# With buffering on (the default) nginx holds the response until its buffer fills or the upstream
# closes. An event stream does neither — it stays open and dribbles small frames — so the browser
# connects successfully and then receives nothing, forever. It is the single most likely
# "works locally, dead behind the proxy" failure in this stack, and tests/e2e asserts a frame
# actually arrives through nginx rather than merely asserting this file contains these directives.
location /api/tasks/stream {
    proxy_pass http://127.0.0.1:${FLOW_PORT}/tasks/stream;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    # An idle stream sends a heartbeat every LZT_FLOW_STREAM_HEARTBEAT_S (15s by default). This must
    # stay comfortably above that or nginx reaps the connection between beats.
    proxy_read_timeout 3600s;
    # Clearing Connection keeps the upstream connection keep-alive instead of being closed per
    # request, which an SSE stream depends on.
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Same treatment for the per-run stream — it is the same mechanism on a different channel.
location ~ ^/api/runs/[^/]+/stream$ {
    proxy_pass http://127.0.0.1:${FLOW_PORT};
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# The flow API. The trailing slash on proxy_pass strips the /api prefix, which is what lets the
# frontend call /api/... in both dev (vite proxy) and production without knowing the difference.
location /api/ {
    proxy_pass http://127.0.0.1:${FLOW_PORT}/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /eventus/ {
    proxy_pass http://127.0.0.1:${EVENTUS_PORT}/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# The panel itself: a built SPA. try_files falls back to index.html so a deep link resolves to the
# app rather than a 404 from the filesystem.
location / {
    root ${PANEL_ROOT};
    try_files $uri $uri/ /index.html;
}

# Hashed asset filenames make these immutable; index.html must never be cached or an operator keeps
# loading the previous build's asset references after an update.
location /assets/ {
    root ${PANEL_ROOT};
    expires 1y;
    add_header Cache-Control "public, immutable";
}
