name: generate-index

# `push: main` ONLY. This is the one workflow with write access, so it must never run code that
# arrived in a pull request: by the time main moves, the change has been reviewed and merged.
#
# Note the asymmetry with validate.yml — that one sees untrusted code and has no write token; this
# one has a write token and sees only reviewed code. Neither ever holds both.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  # Two merges landing together would race to write index.json and one would lose. Serialize.
  group: generate-index
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # The commit below carries [skip ci], but that is a courtesy, not the guard: this check is what
    # actually stops the workflow from triggering itself into a loop.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild index.json
        run: python .github/scripts/generate_index.py

      - name: Commit only if it actually changed
        # Idempotent: a re-run over an unchanged repo produces no commit. Without the diff check,
        # every run would commit an identical file and — [skip ci] or not — churn the history.
        run: |
          if git diff --quiet index.json; then
            echo "index.json unchanged"
            exit 0
          fi
          git config user.name "lzt-flows-bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.json
          git commit -m "chore: regenerate index.json [skip ci]"
          git push
